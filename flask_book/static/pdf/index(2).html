<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather Forecast System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fontawesome.com/releases/v6.0.0/css/font-awesome" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel ="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Weather</h2>
            <div class="weather-input">
                <input type="text" id="city" placeholder="Enter city name...">
                <button type="button" id ="searchBtn">
                    <i class="fa-solid fa-magnifying-glass"></i> Search
                </button>
                <button type="button" id ="locationBtn">
                    <i class = "bx bx-target-lock"></i> Current Location
                </button>
            </div>
        </div>
        <div class="weather-data">
            <div class="weather-left">
                <div class="card">
                    <div class="current-weather">
                        <div class="details">
                            <p>Now</p>
                            <h2>___&deg;C</h2>
                            <p>___</p>
                        </div>
                        <div class="weather-icon">
                            <img src = "https://openweathermap.org/img/wn/04d@2x.png" alt="">
                    </div>
                </div>
                <hr>
                <div class="card-footer">
                    <p><i class="fa-light fa-calendar"></i>____</p>
                    <p><i class="fa-light fa-location-dot"></i>____</p>
                </div>
         </div>   
            <div class="card">
                <h2>5 days Forecast</h2>
                <div class ="day-forecast">
                    <div class="forecast-item">
                        <div class="icon-wrapper">
                            <img src="https://openweathermap.org/img/wn/02d.png" alt="">
                            <span>___&deg;C</span>
                        </div>
                    </div>
                    <div class="forecast-item">
                        <div class="icon-wrapper">
                            <img src="https://openweathermap.org/img/wn/02d.png" alt="">
                            <span>___&deg;C</span>
                        </div>
                    </div>
                    <div class="forecast-item">
                        <div class="icon-wrapper">
                            <img src="https://openweathermap.org/img/wn/02d.png" alt="">
                            <span>___&deg;C</span>
                        </div>
                    </div>
                    <div class="forecast-item">
                        <div class="icon-wrapper">
                            <img src="https://openweathermap.org/img/wn/02d.png" alt="">
                            <span>___&deg;C</span>
                        </div>
                    </div>
                    <div class="forecast-item">
                        <div class="icon-wrapper">
                            <img src="https://openweathermap.org/img/wn/02d.png" alt="">
                            <span>___&deg;C</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="weather-right">
            <h2>Today's Hightlights</h2>
            <div class="highlights">
                <div class="card">
                    <div class="card-head">
                        <p>Air Quality Index</p>
                        <p class="air-index aqi-5">Good</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
