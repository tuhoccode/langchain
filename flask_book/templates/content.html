<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Bootstrap Example</title>
    <link rel="stylesheet" href="static/styles/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="col-10 input-group mb-3 py-5">
        <input type="text" id="summary-input" class="form-control" placeholder="Nhập tóm tắt sách" aria-label="Recipient's username" aria-describedby="basic-addon2">
        <button class="input-group-text" id="search-button"><i class="fa-solid fa-magnifying-glass"></i></button>
      </div>
    </div>
    
    <div class="row">
      <div id="result" class="cha_la_diem_tua_doi_con col-12">
        <!-- Thông tin sách sẽ được hiển thị ở đây -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script>
    // Handle form submission and display result
    document.getElementById('search-button').addEventListener('click', async () => {
        const summary = document.getElementById('summary-input').value;
        const formData = new FormData();
        formData.append('summary', summary);
        
        const response = await fetch('/submit', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        document.getElementById('result').innerHTML = data.html;
    });
  </script>
</body>
</html>
